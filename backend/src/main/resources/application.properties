spring.application.name=certifiedcarry-api

# Run backend on the same port expected by current frontend proxy settings.
server.port=${SERVER_PORT:8000}
server.servlet.context-path=/api

# HTTP response compression (gzip) for text/API payloads.
server.compression.enabled=${SERVER_COMPRESSION_ENABLED:true}
server.compression.min-response-size=${SERVER_COMPRESSION_MIN_RESPONSE_SIZE:1024}
server.compression.mime-types=${SERVER_COMPRESSION_MIME_TYPES:application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript,text/javascript,image/svg+xml}

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/certifiedcarry_backend}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:never}
management.endpoint.health.probes.enabled=${MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED:true}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# CORS (set production frontend origin(s) via SECURITY_CORS_ALLOWED_ORIGINS)
security.cors.allowed-origins=${SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:3005,http://127.0.0.1:3005}
security.cors.allowed-methods=${SECURITY_CORS_ALLOWED_METHODS:GET,POST,PATCH,DELETE,OPTIONS}
security.cors.allowed-headers=${SECURITY_CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,X-Requested-With,X-Request-Id}
security.cors.exposed-headers=${SECURITY_CORS_EXPOSED_HEADERS:X-Request-Id,Retry-After}
security.cors.max-age-seconds=${SECURITY_CORS_MAX_AGE_SECONDS:3600}
security.cors.allow-credentials=${SECURITY_CORS_ALLOW_CREDENTIALS:false}
security.cors.enforce-production-safe-origins=${SECURITY_CORS_ENFORCE_PRODUCTION_SAFE_ORIGINS:false}

# Firebase Admin (disabled by default until service account file is configured)
firebase.enabled=${FIREBASE_ENABLED:false}
firebase.project-id=${FIREBASE_PROJECT_ID:}
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

# Object storage (DigitalOcean Spaces / S3-compatible)
object-storage.enabled=${OBJECT_STORAGE_ENABLED:false}
object-storage.endpoint=${OBJECT_STORAGE_ENDPOINT:}
object-storage.region=${OBJECT_STORAGE_REGION:us-east-1}
object-storage.bucket=${OBJECT_STORAGE_BUCKET:}
object-storage.access-key=${OBJECT_STORAGE_ACCESS_KEY:}
object-storage.secret-key=${OBJECT_STORAGE_SECRET_KEY:}
object-storage.key-prefix=${OBJECT_STORAGE_KEY_PREFIX:player-assets}
object-storage.public-base-url=${OBJECT_STORAGE_PUBLIC_BASE_URL:}
object-storage.presign-expiry-seconds=${OBJECT_STORAGE_PRESIGN_EXPIRY_SECONDS:600}
object-storage.max-upload-bytes=${OBJECT_STORAGE_MAX_UPLOAD_BYTES:6291456}

# Active legal policy versions enforced by registration endpoints.
legal.terms-active-version=${LEGAL_TERMS_ACTIVE_VERSION:cc-terms-2026-04-04}
legal.privacy-active-version=${LEGAL_PRIVACY_ACTIVE_VERSION:cc-privacy-2026-04-04}

# Deferred Firebase account deletion retry queue
account-deletion.firebase-retry-delay-ms=${ACCOUNT_DELETION_FIREBASE_RETRY_DELAY_MS:60000}
account-deletion.firebase-retry-batch-size=${ACCOUNT_DELETION_FIREBASE_RETRY_BATCH_SIZE:25}
account-deletion.firebase-retry-base-delay-seconds=${ACCOUNT_DELETION_FIREBASE_RETRY_BASE_DELAY_SECONDS:30}
account-deletion.firebase-retry-max-delay-seconds=${ACCOUNT_DELETION_FIREBASE_RETRY_MAX_DELAY_SECONDS:3600}

# Outbound email notifications (Brevo SMTP compatible)
notifications.email.enabled=${NOTIFICATIONS_EMAIL_ENABLED:false}
notifications.email.from=${NOTIFICATIONS_EMAIL_FROM:no-reply@certifiedcarry.me}
notifications.email.reply-to=${NOTIFICATIONS_EMAIL_REPLY_TO:support@certifiedcarry.me}
notifications.email.app-base-url=${NOTIFICATIONS_EMAIL_APP_BASE_URL:https://certifiedcarry.me}
notifications.rank-validation-validity-days=${NOTIFICATIONS_RANK_VALIDATION_VALIDITY_DAYS:30}
notifications.rank-expiry-reminder-hours=${NOTIFICATIONS_RANK_EXPIRY_REMINDER_HOURS:24}
notifications.rank-expiry-check-delay-ms=${NOTIFICATIONS_RANK_EXPIRY_CHECK_DELAY_MS:900000}
notifications.rank-expiry-batch-size=${NOTIFICATIONS_RANK_EXPIRY_BATCH_SIZE:100}
notifications.security.admin-login-alert-email=${NOTIFICATIONS_SECURITY_ADMIN_LOGIN_ALERT_EMAIL:}

# SMTP transport defaults (configure these for Brevo in production)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
