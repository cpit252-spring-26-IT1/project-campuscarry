<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var LANGUAGE_STORAGE_KEY = "certifiedcarry-language";
        var THEME_STORAGE_KEY = "certifiedcarry-theme";
        var FIRST_VISIT_BOOTSTRAP_KEY = "certifiedcarry-first-visit-bootstrap";

        var hasBootstrappedFirstVisit = localStorage.getItem(FIRST_VISIT_BOOTSTRAP_KEY) === "1";

        if (!hasBootstrappedFirstVisit) {
          localStorage.setItem(LANGUAGE_STORAGE_KEY, "ar");
          localStorage.setItem(THEME_STORAGE_KEY, "light");
          localStorage.setItem(FIRST_VISIT_BOOTSTRAP_KEY, "1");
        }

        var savedLanguage = localStorage.getItem(LANGUAGE_STORAGE_KEY);
        var language = savedLanguage === "ar" || savedLanguage === "en" ? savedLanguage : "ar";

        var savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
        var theme = savedTheme === "dark" || savedTheme === "light" ? savedTheme : "light";

        document.documentElement.setAttribute("lang", language);
        document.documentElement.setAttribute("dir", language === "ar" ? "rtl" : "ltr");
        document.documentElement.dataset.theme = theme;
        document.documentElement.classList.toggle("dark", theme === "dark");

        localStorage.removeItem("certifiedcarry-motion-preference");
        delete document.documentElement.dataset.motion;
      })();
    </script>
    <title>CertifiedCarry</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
